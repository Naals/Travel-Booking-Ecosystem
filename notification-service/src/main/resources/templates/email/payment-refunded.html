<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Refund Processed</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .container { max-width: 600px; margin: 40px auto; padding: 24px; }
        .header { background: #057a55; color: white; padding: 24px; border-radius: 8px 8px 0 0; }
        .body { background: #f9fafb; padding: 32px; border-radius: 0 0 8px 8px; }
        .footer { text-align: center; color: #6b7280; font-size: 12px; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 style="margin:0">Refund Processed ✓</h1>
    </div>
    <div class="body">
        <p>Hi <strong th:text="${fullName}">Traveller</strong>,</p>
        <p>Your refund of <strong th:text="${amount + ' ' + currency}">$299.99 USD</strong>
            for booking <strong th:text="${bookingId}">BK-001</strong>
            has been processed.</p>
        <p>Please allow 5-10 business days for the funds to appear
            on your original payment method.</p>
        <p>Refund reference: <code th:text="${refundId}">re_abc123</code></p>
    </div>
    <div class="footer">
        <p>© 2024 TravelPlatform. All rights reserved.</p>
    </div>
</div>
</body>
</html>
