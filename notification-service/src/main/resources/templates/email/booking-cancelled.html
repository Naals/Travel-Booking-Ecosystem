<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Cancelled</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .container { max-width: 600px; margin: 40px auto; padding: 24px; }
        .header { background: #e3a008; color: white; padding: 24px; border-radius: 8px 8px 0 0; }
        .body { background: #f9fafb; padding: 32px; border-radius: 0 0 8px 8px; }
        .footer { text-align: center; color: #6b7280; font-size: 12px; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 style="margin:0">Booking Cancelled</h1>
    </div>
    <div class="body">
        <p>Hi <strong th:text="${fullName}">Traveller</strong>,</p>
        <p>Your booking <strong th:text="${bookingId}">BK-001</strong>
            has been cancelled.</p>
        <p th:if="${reason}">Reason: <em th:text="${reason}"></em></p>
        <p>If a payment was charged, your refund will be processed within
            5-10 business days to your original payment method.</p>
        <p>We hope to welcome you back soon.</p>
    </div>
    <div class="footer">
        <p>© 2024 TravelPlatform. All rights reserved.</p>
    </div>
</div>
</body>
</html>
