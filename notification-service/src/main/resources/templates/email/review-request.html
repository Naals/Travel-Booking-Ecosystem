<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>How was your stay?</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .container { max-width: 600px; margin: 40px auto; padding: 24px; }
        .header { background: #7e3af2; color: white; padding: 24px; border-radius: 8px 8px 0 0; }
        .body { background: #f9fafb; padding: 32px; border-radius: 0 0 8px 8px; }
        .button { display: inline-block; background: #7e3af2; color: white;
            padding: 12px 24px; border-radius: 6px; text-decoration: none;
            font-weight: bold; margin-top: 16px; }
        .footer { text-align: center; color: #6b7280; font-size: 12px; margin-top: 24px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 style="margin:0">How was your stay? ⭐</h1>
    </div>
    <div class="body">
        <p>Hi <strong th:text="${fullName}">Traveller</strong>,</p>
        <p>We hope you enjoyed your stay at
            <strong th:text="${resourceName}">Cozy Cabin</strong>.</p>
        <p>Your review helps other travellers make informed decisions.
            It only takes 2 minutes:</p>
        <a class="button" th:href="${reviewUrl}">Leave a Review</a>
    </div>
    <div class="footer">
        <p>© 2024 TravelPlatform. All rights reserved.</p>
    </div>
</div>
</body>
</html>
